apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: chronicle
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: chronicle-unit
        static_configs:
          - targets:
              - chronicle-unit-0.chronicle-unit-headless.chronicle.svc.cluster.local:7071
              - chronicle-unit-1.chronicle-unit-headless.chronicle.svc.cluster.local:7071
              - chronicle-unit-2.chronicle-unit-headless.chronicle.svc.cluster.local:7071
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: chronicle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.2.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=7d
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: chronicle
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
