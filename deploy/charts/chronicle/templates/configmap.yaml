apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  chronicled.toml: |
    [server]
    bind_address = "{{ .Values.server.bindAddress }}"

    [wal]
    dir = "/data/wal"

    [storage]
    dir = "/data/storage"

    [segments]
    dir = "/data/segments"

    [catalog]
    backend = "{{ .Values.catalog.backend }}"
    service_address = "{{ .Values.catalog.serviceAddress }}"

    [log]
    level = "{{ .Values.log.level }}"
