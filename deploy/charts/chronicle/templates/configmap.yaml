apiVersion: v1
kind: ConfigMap
metadata:
  name: chronicle-unit-config
  labels:
    app.kubernetes.io/name: chronicle-unit
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  chronicled.toml: |
    io_mode = "{{ .Values.unit.ioMode }}"

    [server]
    bind_address = "{{ .Values.unit.server.bindAddress }}"

    [wal]
    dir = "/data/wal"

    [storage]
    dir = "/data/storage"

    [segments]
    dir = "/data/segments"

    [catalog]
    backend = "{{ .Values.catalog.backend }}"
    service_address = "{{ .Values.catalog.serviceAddress }}"

    [log]
    level = "{{ .Values.log.level }}"
