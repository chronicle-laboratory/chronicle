{{- if .Values.saga.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chronicle-saga
  labels:
    app.kubernetes.io/name: chronicle-saga
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: chronicle-saga-headless
  replicas: {{ .Values.saga.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: chronicle-saga
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chronicle-saga
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: saga
          image: "{{ .Values.saga.image.repository }}:{{ .Values.saga.image.tag }}"
          imagePullPolicy: {{ .Values.saga.image.pullPolicy }}
          command: ["chronicle", "saga", "start"]
          ports:
            - containerPort: {{ .Values.saga.httpPort }}
              name: http
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.saga.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v1/status
              port: {{ .Values.saga.httpPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/status
              port: {{ .Values.saga.httpPort }}
            initialDelaySeconds: 10
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.saga.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: chronicle-saga
  labels:
    app.kubernetes.io/name: chronicle-saga
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: chronicle-saga
  ports:
    - port: {{ .Values.saga.httpPort }}
      targetPort: {{ .Values.saga.httpPort }}
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: chronicle-saga-headless
  labels:
    app.kubernetes.io/name: chronicle-saga
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: chronicle-saga
  ports:
    - port: {{ .Values.saga.httpPort }}
      targetPort: {{ .Values.saga.httpPort }}
      name: http
{{- end }}
