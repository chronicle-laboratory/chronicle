{{- if .Values.lexicon.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chronicle-lexicon
  labels:
    app.kubernetes.io/name: chronicle-lexicon
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.lexicon.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: chronicle-lexicon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chronicle-lexicon
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: lexicon
          image: "{{ .Values.lexicon.image.repository }}:{{ .Values.lexicon.image.tag }}"
          imagePullPolicy: {{ .Values.lexicon.image.pullPolicy }}
          command: ["chronicle", "lexicon", "start"]
          args:
            - "--grpc-port"
            - "{{ .Values.lexicon.grpcPort }}"
            - "--http-port"
            - "{{ .Values.lexicon.httpPort }}"
            - "--store-dir"
            - "/data/lexicon"
          ports:
            - containerPort: {{ .Values.lexicon.grpcPort }}
              name: grpc
            - containerPort: {{ .Values.lexicon.httpPort }}
              name: http
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.lexicon.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v1/subjects
              port: {{ .Values.lexicon.httpPort }}
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/subjects
              port: {{ .Values.lexicon.httpPort }}
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: chronicle-lexicon
  labels:
    app.kubernetes.io/name: chronicle-lexicon
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: chronicle-lexicon
  ports:
    - port: {{ .Values.lexicon.grpcPort }}
      targetPort: {{ .Values.lexicon.grpcPort }}
      name: grpc
    - port: {{ .Values.lexicon.httpPort }}
      targetPort: {{ .Values.lexicon.httpPort }}
      name: http
{{- end }}
