# ============================================================
# Chronicle unified configuration
# ============================================================
# Each component reads its own section:
#   chronicle unit start -c chronicled.toml     → top-level sections
#   chronicle lexicon start -c chronicled.toml   → [lexicon]
#   chronicle saga start -c chronicled.toml      → [saga]
# ============================================================

# --- Unit (storage node) ---

[server]
bind_address = "127.0.0.1:7070"

[wal]
dir = "/tmp/chronicle-wal"

[storage]
dir = "/tmp/chronicle-storage"

[log]
level = "info"

# --- Lexicon (schema registry) ---

[lexicon]
grpc_port = 50060
http_port = 8080
local_store_dir = "/data/lexicon"
use_local_store = true

# --- Saga (query engine) ---

[saga]
wal_endpoint = "http://127.0.0.1:7070"
lexicon_endpoint = "http://chronicle-lexicon:50060"
http_port = 3000
local_data_dir = "/tmp/saga/data"
checkpoint_path = "/tmp/saga/checkpoint.json"
use_local_fs = true
