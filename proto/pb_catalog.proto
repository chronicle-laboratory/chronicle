syntax = "proto3";

package io.chronicle.proto.catalog.v1;

message TimelineMeta {
  string name = 1;
  int64 timeline_id = 2;
  TimelineStatus status = 3;
  int64 term = 4;
  int64 version = 5;
  int64 lra = 6;
}

message Segment {
  repeated string ensemble = 1;
  int64 start_offset = 2;
}

enum TimelineStatus {
  ACTIVE = 0;
  SEALED = 1;
}

enum UnitStatus {
  WRITABLE = 0;
  READONLY = 1;
}

message UnitRegistration {
  string address = 1;
  UnitStatus status = 2;
  string zone = 3;
}

message UnitRegistry {
  repeated UnitRegistration units = 1;
}
